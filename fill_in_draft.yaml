# 標記 → 辦理文字模板 + 後續動作 對應表。改規則只動此檔。
# 動作可填三種值：
#   none    — 只儲存，不做後續動作
#   陳會    — 儲存後按「陳會」鈕
#   備選動作 — 預留值，目前程式遇到只記 log 不執行，未來再接邏輯

default:                      # 無標記 / 標記未命中時的保守 fallback
  辦理文字: "擬:"
  動作: none

rules:                       # 依優先序由小到大評估，第一個命中的標記決定一切
  - 標記: 不參加
    優先序: 10
    辦理文字: "擬:不參加，存查。"
    動作: none
  - 標記: 資安
    優先序: 20
    辦理文字: "本案為資安宣導事項，擬陳會相關單位知照。"
    動作: 陳會
  - 標記: 設備
    優先序: 30
    辦理文字: "……（待填）"
    動作: none
